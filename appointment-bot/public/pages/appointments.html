<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citas - Dental Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <i class="fas fa-tooth"></i>
          <span>Dental Bot</span>
        </div>
      </div>
      
      <nav class="sidebar-nav">
        <a href="../index.html" class="nav-item">
          <i class="fas fa-home"></i>
          <span>Dashboard</span>
        </a>
        <a href="appointments.html" class="nav-item active">
          <i class="fas fa-calendar-check"></i>
          <span>Citas</span>
        </a>
        <a href="patients.html" class="nav-item">
          <i class="fas fa-users"></i>
          <span>Pacientes</span>
        </a>
        <a href="calendar.html" class="nav-item">
          <i class="fas fa-calendar-alt"></i>
          <span>Calendario</span>
        </a>
        <a href="messages.html" class="nav-item">
          <i class="fas fa-comments"></i>
          <span>Mensajes</span>
        </a>
        <a href="services.html" class="nav-item">
          <i class="fas fa-list"></i>
          <span>Servicios</span>
        </a>
        <a href="settings.html" class="nav-item">
          <i class="fas fa-cog"></i>
          <span>Configuración</span>
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">
            <i class="fas fa-user-md"></i>
          </div>
          <div class="user-details">
            <span class="user-name">Admin</span>
            <span class="user-role">Clínica Dental</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="header">
        <button class="menu-toggle" id="menuToggle">
          <i class="fas fa-bars"></i>
        </button>
        <div class="header-right">
          <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
            <i class="fas fa-sun"></i>
            <i class="fas fa-moon"></i>
          </button>
          <div class="notifications">
            <button class="btn-icon" id="notificationBtn" data-tooltip="Notificaciones">
              <i class="fas fa-bell"></i>
              <span class="badge" id="notificationBadge">0</span>
            </button>
          </div>
        </div>
      </header>

      <div class="content">
        <div class="page-header">
          <h1>Gestión de Citas</h1>
          <p class="subtitle">Administra las citas de la clínica</p>
        </div>

        <!-- Actions Bar -->
        <div class="filters">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" class="form-input" id="searchInput" placeholder="Buscar citas...">
          </div>
          <select class="form-select" id="statusFilter" style="width: 150px;">
            <option value="">Todos los estados</option>
            <option value="confirmada">Confirmada</option>
            <option value="pendiente">Pendiente</option>
            <option value="cancelada">Cancelada</option>
            <option value="completada">Completada</option>
          </select>
          <input type="date" class="form-input" id="dateFilter" style="width: 150px;">
          <button class="btn btn-secondary" id="clearFilters">
            <i class="fas fa-times"></i> Limpiar
          </button>
          <div style="flex: 1;"></div>
          <button class="btn btn-primary" id="newAppointmentBtn">
            <i class="fas fa-plus"></i> Nueva Cita
          </button>
        </div>

        <!-- Appointments Table -->
        <div class="card">
          <div class="card-header">
            <h2><i class="fas fa-list"></i> Lista de Citas</h2>
            <span id="totalCount">0 citas</span>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table" id="appointmentsTable">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Paciente</th>
                    <th>Servicio</th>
                    <th>Canal</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody>
                  <tr class="empty-state">
                    <td colspan="8">
                      <div class="loading-container">
                        <div class="spinner"></div>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Mobile Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
  </div>

  <!-- New/Edit Appointment Modal -->
  <div class="modal" id="appointmentModal">
    <div class="modal-content" style="max-width: 600px;">
      <div class="modal-header">
        <h3 id="modalTitle">Nueva Cita</h3>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="appointmentForm">
          <input type="hidden" id="appointmentId">
          
          <div class="form-group">
            <label class="form-label">Paciente *</label>
            <select class="form-select" id="patientSelect" required>
              <option value="">Seleccionar paciente...</option>
            </select>
          </div>
          
          <div class="form-group">
            <label class="form-label">Servicio *</label>
            <select class="form-select" id="serviceSelect" required>
              <option value="">Seleccionar servicio...</option>
            </select>
          </div>
          
          <div class="form-group">
            <label class="form-label">Fecha *</label>
            <input type="date" class="form-input" id="appointmentDate" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Hora *</label>
            <select class="form-select" id="timeSlot" required>
              <option value="">Seleccionar hora...</option>
            </select>
          </div>
          
          <div class="form-group">
            <label class="form-label">Estado</label>
            <select class="form-select" id="statusSelect">
              <option value="pendiente">Pendiente</option>
              <option value="confirmada">Confirmada</option>
              <option value="completada">Completada</option>
              <option value="cancelada">Cancelada</option>
            </select>
          </div>
          
          <div class="form-group">
            <label class="form-label">Notas</label>
            <textarea class="form-textarea" id="notes" rows="3"></textarea>
          </div>
          
          <div style="display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem;">
            <button type="button" class="btn btn-secondary" id="cancelBtn">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar Cita</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/appointments.js"></script>
</body>
</html>
