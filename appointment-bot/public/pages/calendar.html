<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario - Dental Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: var(--border-color);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .calendar-header {
      background: var(--bg-sidebar);
      color: white;
      padding: 0.75rem;
      text-align: center;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .calendar-day {
      background: white;
      min-height: 100px;
      padding: 0.5rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .calendar-day:hover {
      background: var(--bg-main);
    }
    .calendar-day.other-month {
      background: #f8fafc;
      color: var(--text-light);
    }
    .calendar-day.today {
      background: #eff6ff;
    }
    .calendar-day-number {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .calendar-day.today .calendar-day-number {
      color: var(--primary);
    }
    .calendar-event {
      font-size: 0.7rem;
      padding: 0.125rem 0.375rem;
      border-radius: 4px;
      margin-bottom: 0.125rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .calendar-event.confirmed { background: #dcfce7; color: #166534; }
    .calendar-event.pending { background: #fef3c7; color: #92400e; }
    .calendar-event.completed { background: #dbeafe; color: #1e40af; }
    .calendar-nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .calendar-nav h2 {
      margin: 0;
      min-width: 200px;
      text-align: center;
    }
    .calendar-nav button {
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      background: var(--bg-main);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .calendar-nav button:hover {
      background: var(--border-color);
    }
    .calendar-legend {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <i class="fas fa-tooth"></i>
          <span>Dental Bot</span>
        </div>
      </div>
      
      <nav class="sidebar-nav">
        <a href="../index.html" class="nav-item">
          <i class="fas fa-home"></i>
          <span>Dashboard</span>
        </a>
        <a href="appointments.html" class="nav-item">
          <i class="fas fa-calendar-check"></i>
          <span>Citas</span>
        </a>
        <a href="patients.html" class="nav-item">
          <i class="fas fa-users"></i>
          <span>Pacientes</span>
        </a>
        <a href="calendar.html" class="nav-item active">
          <i class="fas fa-calendar-alt"></i>
          <span>Calendario</span>
        </a>
        <a href="messages.html" class="nav-item">
          <i class="fas fa-comments"></i>
          <span>Mensajes</span>
        </a>
        <a href="services.html" class="nav-item">
          <i class="fas fa-list"></i>
          <span>Servicios</span>
        </a>
        <a href="settings.html" class="nav-item">
          <i class="fas fa-cog"></i>
          <span>Configuración</span>
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">
            <i class="fas fa-user-md"></i>
          </div>
          <div class="user-details">
            <span class="user-name">Admin</span>
            <span class="user-role">Clínica Dental</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="header">
        <button class="menu-toggle" id="menuToggle">
          <i class="fas fa-bars"></i>
        </button>
        <div class="header-right">
          <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
            <i class="fas fa-sun"></i>
            <i class="fas fa-moon"></i>
          </button>
          <div class="notifications">
            <button class="btn-icon" id="notificationBtn" data-tooltip="Notificaciones">
              <i class="fas fa-bell"></i>
              <span class="badge" id="notificationBadge">0</span>
            </button>
          </div>
        </div>
      </header>

      <div class="content">
        <div class="page-header">
          <h1>Calendario de Citas</h1>
          <p class="subtitle">Vista mensual de todas las citas</p>
        </div>

        <!-- Calendar Navigation -->
        <div class="calendar-nav">
          <button id="prevMonth"><i class="fas fa-chevron-left"></i></button>
          <h2 id="currentMonth">Noviembre 2025</h2>
          <button id="nextMonth"><i class="fas fa-chevron-right"></i></button>
          <div style="flex: 1;"></div>
          <button class="btn btn-primary" onclick="location.href='appointments.html'">
            <i class="fas fa-list"></i> Ver Lista
          </button>
        </div>

        <!-- Calendar -->
        <div class="card">
          <div class="card-body" style="padding: 0;">
            <div class="calendar-grid" id="calendar">
              <!-- Calendar header -->
              <div class="calendar-header">Dom</div>
              <div class="calendar-header">Lun</div>
              <div class="calendar-header">Mar</div>
              <div class="calendar-header">Mié</div>
              <div class="calendar-header">Jue</div>
              <div class="calendar-header">Vie</div>
              <div class="calendar-header">Sáb</div>
              <!-- Days will be populated by JavaScript -->
            </div>
          </div>
        </div>

        <!-- Legend -->
        <div class="calendar-legend">
          <div class="legend-item">
            <div class="legend-dot" style="background: #dcfce7;"></div>
            <span>Confirmada</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background: #fef3c7;"></div>
            <span>Pendiente</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background: #dbeafe;"></div>
            <span>Completada</span>
          </div>
        </div>
      </div>
    </main>

    <!-- Mobile Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/calendar.js"></script>
</body>
</html>
